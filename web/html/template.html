<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Validation-Suite</title>
<style>
  :root {
    --bg: #1e1f24;
    --panel: #2a2b32;
    --border: #3c3e47;
    --text: #e6e6e9;
    --text-dim: #9a9ca5;
    --equal: #3a6b4f;
    --file-diff: #8a3a3a;
    --missing-files: #8a3a3a;
    --mono: "Fira Code", monospace;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 32px;
    background: var(--bg);
    color: var(--text);
    font-family: Roboto, sans-serif;
  }

  h1 {
    font-size: 20px;
    font-weight: 600;
    margin: 0 0 4px 0;
  }

  p.subtitle {
    color: var(--text-dim);
    font-size: 13px;
    margin: 0 0 24px 0;
  }

  .table-wrap {
    overflow-x: auto;
  }

  table {
    border-collapse: collapse;
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    font-size: 13px;
  }

  th, td {
    border: 1px solid var(--border);
    padding: 10px 12px;
    text-align: left;
    white-space: nowrap;
  }

  th {
    color: var(--text-dim);
    font-weight: 500;
    font-family: var(--mono);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  th.corner {
    background: var(--panel);
  }

  th.row-header {
    color: var(--text);
    text-transform: none;
    font-size: 13px;
    background: var(--panel);
  }

  td.cell {
    cursor: pointer;
    font-family: var(--mono);
    text-align: center;
    transition: filter 0.15s ease;
  }

  td.cell:hover {
    filter: brightness(1.25);
  }

  td.empty-cell {
    color: var(--text-dim);
    text-align: center;
  }

  .status-equal { background: var(--equal); }
  .status-file_diffs { background: var(--file-diff); }
  .status-missing_files { background: var(--missing-files); }

  .legend {
    display: flex;
    gap: 20px;
    margin-top: 16px;
    font-size: 12px;
    color: var(--text-dim);
  }

  .legend span {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .legend i {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    display: inline-block;
  }

  /* The overlay (background) */
  .modal-overlay {
    display: none;
    position: fixed;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
  }
    /* Show the modal */
  .modal-overlay.show {
    display: block;
  }

  /* The modal box */
  .modal-box {
    background: #474951;
    width: 90%;
    max-width: 800px;
    max-height: 80vh;
    overflow-y: auto;
    margin: 80px auto;
    padding: 20px;
    border-radius: 10px;
    position: relative;
  }

  .modal-box h3 {
    word-break: break-all;
    margin-top: 0;
  }

  .modal-box pre {
    white-space: pre-wrap;
    word-break: break-word;
  }

  .modal-close {
    position: absolute;
    top: 10px;
    right: 14px;
    background: none;
    border: none;
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
  }
</style>
</head>
<body>

  <h1>Validation-Suite</h1>
  <p class="subtitle">Results of cross-validation of different ROOT versions</p>
  <p>Click on a cell to see results of comparison (row = write-version, column = read-version).</p>

  <div class="table-wrap">
    <table id="matrix-table">
      <thead id="table-head">
        <!-- filled by JS -->
      </thead>
      <tbody id="table-body">
        <!-- filled by JS -->
      </tbody>
    </table>
  </div>

  <div class="legend">
    <span><i style="background: var(--equal)"></i>equal</span>
    <span><i style="background: var(--file-diff)"></i>file difference / no files compared</span>
  </div>

  <script>
    let modal_heading, modal_text;

    // map status code to different outputs
    function statusSign(statusCode) {
      return {0: "✓", 1: "𐄂", 2: "𐄂"}[statusCode] ?? `unknown(${statusCode})`;
    }

    function statusLabel(statusCode) {
      return {0: "equal", 1: "file differences", 2: "no files compared"}[statusCode] ?? `unknown(${statusCode})`;
    }

    function statusColor(statusCode) {
      return {0: "equal", 1: "file_diffs", 2: "missing_files"}[statusCode] ?? `unknown(${statusCode})`;
    }

    function worstStatus(comparisons) {
      let worst = 0;
      comparisons.forEach((c) => {
        if (c.status > worst) {
          worst = c.status
        }
      });
      return worst;
    }

    // create modal object that is displayed when clicking on a table cell
    function createModal() {
      const overlay = document.createElement('div');
      overlay.id = 'modal';
      overlay.className = 'modal-overlay';

      const box = document.createElement('div');
      box.className = 'modal-box';

      const closeBtn = document.createElement('button');
      closeBtn.id = 'closeBtn';
      closeBtn.className = 'modal-close';
      closeBtn.textContent = '✖';

      modal_heading = document.createElement('h3');
      modal_text = document.createElement('pre');

      box.appendChild(closeBtn);
      box.appendChild(modal_heading);
      box.appendChild(modal_text);
      overlay.appendChild(box);

      document.body.appendChild(overlay);

      closeBtn.addEventListener('click', () => {
        closeModal();
      });

      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) closeModal();
      });
    }

    // open modal and fill it with text
    function openModal(heading_text, text_text) {
      modal_heading.textContent = heading_text;
      modal_text.textContent = text_text || "(no data available)";
      modal.classList.add("show");
    }

    // closing modal by making it invisible
    function closeModal() {
      modal.classList.remove("show");
    }

    // Build text inside modal with all comparison results
    function formatComparisons(comparisons) {
      let assets = false;
      return comparisons.map((c) => {
        const lines = [];
        const { writeVer, readVer } = parseKey(c.folder_b);
        if (!assets) {
          if (writeVer.startsWith("RNTuple") || readVer.startsWith("Validation")) {
            assets = true;
            lines.push("=".repeat(16) + " Assets " + "=".repeat(16) + "\n");
          }
        }
        lines.push(`Compared with: ${c.folder_b}\n`);
        lines.push(`Status: ${statusLabel(c.status)}`);

        if (c.missing_in_a.length > 0) {
          lines.push("")
          lines.push(`Files missing in ${c.folder_a}:`);
          c.missing_in_a.forEach((file) => {
            lines.push(`  ● ${file}`);
          });
        }
        if (c.missing_in_b.length > 0) {
          lines.push("")
          lines.push(`Files missing in ${c.folder_b}:`);
          c.missing_in_b.forEach((file) => {
            lines.push(`  ● ${file}`);
          });
        }

        const diffKeys = Object.keys(c.file_diffs);
        if (diffKeys.length > 0) {
          lines.push("")
          lines.push("File differences:");
          diffKeys.forEach((fname) => {
            lines.push(c.file_diffs[fname]);
          });
        }

        return lines.join("\n");
      }).join("\n\n" + "=".repeat(40) + "\n\n");
    }

    const test_data = __PLACE_HOLDER__;
    
    // extract write version and read version from path
    function parseKey(key) {
      const withoutPrefix = key.replace(/^read\//, "");
      const lastSlash = withoutPrefix.lastIndexOf("/");
      if (lastSlash === -1) {
        return { writeVer: withoutPrefix, readVer: "" };
      }
      return {
        writeVer: withoutPrefix.slice(0, lastSlash),
        readVer: withoutPrefix.slice(lastSlash + 1)
      };
    }

    // sort first by text then by number
    function customSort(data) {
      const stringsWithNumbers = data.filter(x => /\d+[a-zA-Z]/.test(x));
      const rest = data.filter(x => !stringsWithNumbers.includes(x));

      const numbers = rest.filter((x) => parseInt(x, 10));
      const words = rest.filter((x) => !parseInt(x, 10));

      return result = [
        ...words.sort((a, b) => a.localeCompare(b)), 
        ...stringsWithNumbers.concat(numbers).sort((a, b) => parseInt(a) - parseInt(b)),
      ];
    }

    createModal();
    modal = document.getElementById("modal");

    const writeVersionsSet = new Set();
    const readVersionsSet = new Set();
    const lookup = {};

    Object.keys(test_data).forEach((outerKey) => {
      const { writeVer, readVer } = parseKey(outerKey);
      writeVersionsSet.add(writeVer);
      readVersionsSet.add(readVer);

      const comparisons = Object.values(test_data[outerKey]);

      if (!lookup[writeVer]) lookup[writeVer] = {};
      lookup[writeVer][readVer] = comparisons;
    });

    const writeVersions = customSort(Array.from(writeVersionsSet));
    const readVersions = Array.from(readVersionsSet).sort();

    // create table header
    const thead = document.getElementById("table-head");
    const headRow = document.createElement("tr");

    const cornerTh = document.createElement("th");
    cornerTh.className = "corner";
    cornerTh.textContent = "write \\ read";
    headRow.appendChild(cornerTh);

    readVersions.forEach((readVer) => {
      if (readVer.startsWith("Validation")) {return;}
      const th = document.createElement("th");
      th.textContent = readVer;
      headRow.appendChild(th);
    });
    thead.appendChild(headRow);

    // create and fill table body
    const tbody = document.getElementById("table-body");

    writeVersions.forEach((writeVer) => {
      const row = document.createElement("tr");

      const rowHeaderTh = document.createElement("th");
      rowHeaderTh.className = "row-header";
      rowHeaderTh.textContent = writeVer;
      row.appendChild(rowHeaderTh);

      readVersions.forEach((readVer) => {
        if (readVer.startsWith("Validation")) {return;}
        const td = document.createElement("td");
        const comparisons = lookup[writeVer] ? lookup[writeVer][readVer] : undefined;

        if (!comparisons || comparisons.length === 0) {
          td.classList.add("empty-cell");
          td.textContent = "-";
        } else {
          const sign = statusSign(worstStatus(comparisons));
          const color_label = statusColor(worstStatus(comparisons));
          td.classList.add("cell", `status-${color_label}`);
          td.textContent = sign;

          td.addEventListener("click", () => {
            openModal(`Write version: ${writeVer} -- Read version: ${readVer}`, formatComparisons(comparisons));
          });
        }

        row.appendChild(td);
      });

      tbody.appendChild(row);
    });
  </script>

</body>
</html>
